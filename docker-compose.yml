version: '3.8'
services:
  mongo:
    image: mongo:6.0
    container_name: eker_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: eker_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - eker_net

  frontend:
    build: ./frontend
    container_name: eker_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - eker_net

volumes:
  mongo_data:

networks:
  eker_net:
    driver: bridge
